<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader Ultra</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="glass border border-slate-700 p-6 rounded-3xl shadow-2xl w-full max-w-md">
        
        <header class="text-center mb-6">
            <h1 class="text-2xl font-black tracking-tighter bg-gradient-to-br from-white to-slate-500 bg-clip-text text-transparent italic">
                YT DOWNLOADER ULTRA
            </h1>
            <p class="text-slate-500 text-xs mt-1 uppercase tracking-widest">High quality extraction</p>
        </header>

        <div class="relative mb-6">
            <input type="url" id="urlInput" placeholder="Pega el enlace de YouTube aquí..." 
                class="w-full pl-4 pr-4 py-4 bg-slate-900/50 border border-slate-700 rounded-2xl focus:outline-none focus:border-blue-500 transition-all text-sm">
        </div>

        <div class="flex border-b border-slate-800 mb-6">
            <button id="tabVideo" onclick="switchTab('video')" class="flex-1 py-3 text-sm font-bold tab-active tracking-wide">Video</button>
            <button id="tabAudio" onclick="switchTab('audio')" class="flex-1 py-3 text-sm font-bold text-slate-500 tracking-wide">Solo audio</button>
        </div>

        <div class="space-y-4 mb-8">
            <div id="videoOptions">
                <label class="text-[10px] uppercase font-bold text-slate-500 mb-2 block tracking-widest">Resolución de video</label>
                <select id="videoQuality" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm outline-none">
                    <option value="1080">1080p (Full HD - Máxima calidad)</option>
                    <option value="720" selected>720p (HD - Recomendado)</option>
                    <option value="480">480p (Calidad estándar)</option>
                </select>
            </div>

            <div id="audioOptions" class="hidden">
                <label class="text-[10px] uppercase font-bold text-slate-500 mb-2 block tracking-widest">Calidad de audio (MP3)</label>
                <select id="audioQuality" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm outline-none">
                    <option value="320">320 kbps (Calidad de estudio)</option>
                    <option value="192" selected>192 kbps (Alta fidelidad)</option>
                    <option value="128">128 kbps (Estándar)</option>
                </select>
            </div>
        </div>

        <button id="btnMain" onclick="procesarDescarga()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-xl shadow-blue-900/20 active:scale-95 tracking-wide">
            Empezar conversión
        </button>

        <div id="loadingArea" class="hidden mt-8 text-center">
            <div class="w-12 h-1 bg-blue-500 mx-auto rounded-full mb-4 animate-pulse"></div>
            <p id="statusText" class="text-xs font-medium text-blue-400">Iniciando servidores...</p>
        </div>

        <div id="resultArea" class="hidden mt-8"></div>

    </div>

    <script src="app.js"></script>
</body>
</html>
